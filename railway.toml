# railway.toml — SmartCareerAI / PlaceNxt Monorepo
#
# Railway reads this file from the repo root.
# Each Railway service must be configured in the dashboard with:
#   Root Directory  : (empty — repo root)
#   Dockerfile Path : services/<service-name>/Dockerfile
#
# Every service has its own self-contained Dockerfile under services/<name>/Dockerfile
# No build args (SERVICE_NAME) are required — it is baked into each Dockerfile.
#
# Reference: https://docs.railway.app/reference/config-as-code

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/health"
healthcheckTimeout = 30
