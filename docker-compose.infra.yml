# PlaceNxt — Infrastructure only
# Use when running services locally with: npm run dev:services
# Usage: docker-compose -f docker-compose.infra.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: placenxt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-placenxt}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-placenxt123}
      POSTGRES_DB: ${DB_NAME:-placenxt_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-placenxt} -d ${DB_NAME:-placenxt_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: placenxt-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: placenxt-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  # Coturn TURN Server (WebRTC NAT traversal)
  coturn:
    image: coturn/coturn:latest
    container_name: placenxt-coturn
    restart: unless-stopped
    network_mode: host
    command: >
      -n --log-file=stdout --min-port=49152 --max-port=49252 --realm=placenxt.com --fingerprint --lt-cred-mech --user=${TURN_USERNAME:-turnuser}:${TURN_CREDENTIAL:-turnpassword} --no-tls --no-dtls --listening-port=3478

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: placenxt-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Self-hosted Piston code execution engine (replaces public emkc.org API)
  piston:
    image: ghcr.io/engineer-man/piston
    container_name: placenxt-piston
    restart: unless-stopped
    ports:
      - "2000:2000"
    volumes:
      - piston_data:/piston
    tmpfs:
      - /tmp:exec,size=512m
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  # Installs required language packages into Piston on first startup
  piston-init:
    image: curlimages/curl:latest
    container_name: placenxt-piston-init
    depends_on:
      - piston
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "Waiting for Piston to be ready..."
        until curl -sf http://piston:2000/api/v2/piston/runtimes > /dev/null; do sleep 3; done
        echo "Installing language packages..."
        curl -sf -X POST http://piston:2000/api/v2/piston/packages \
          -H 'Content-Type: application/json' -d '{"language":"python","version":"3.10.0"}'
        curl -sf -X POST http://piston:2000/api/v2/piston/packages \
          -H 'Content-Type: application/json' -d '{"language":"javascript","version":"18.15.0"}'
        curl -sf -X POST http://piston:2000/api/v2/piston/packages \
          -H 'Content-Type: application/json' -d '{"language":"java","version":"15.0.2"}'
        curl -sf -X POST http://piston:2000/api/v2/piston/packages \
          -H 'Content-Type: application/json' -d '{"language":"c++","version":"10.2.0"}'
        curl -sf -X POST http://piston:2000/api/v2/piston/packages \
          -H 'Content-Type: application/json' -d '{"language":"c","version":"10.2.0"}'
        curl -sf -X POST http://piston:2000/api/v2/piston/packages \
          -H 'Content-Type: application/json' -d '{"language":"typescript","version":"5.0.3"}'
        curl -sf -X POST http://piston:2000/api/v2/piston/packages \
          -H 'Content-Type: application/json' -d '{"language":"go","version":"1.16.2"}'
        curl -sf -X POST http://piston:2000/api/v2/piston/packages \
          -H 'Content-Type: application/json' -d '{"language":"rust","version":"1.50.0"}'
        echo "Piston packages installed."

volumes:
  postgres_data:
  redis_data:
  minio_data:
  rabbitmq_data:
  piston_data:


networks:
  default:
    name: placenxt-network
